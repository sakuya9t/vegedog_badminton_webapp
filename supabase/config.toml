# Supabase CLI config for local development.
# https://supabase.com/docs/guides/local-development/cli/config
#
# Running `supabase start` from the repo root will boot a full local Supabase
# stack (Postgres + Auth + Storage + Studio + Mailpit) and apply
# `supabase/schema.sql` as seed SQL so the database matches the production
# schema. Credentials are printed to your terminal — copy them into
# `.env.local` (see `.env.local.example`).

project_id = "vegedog-badminton"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
# After `supabase start` / `supabase db reset`, run schema.sql so the local DB
# matches the production schema. Keep this file in sync with the hosted DB.
enabled = true
sql_paths = ["./schema.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
# Local mail catcher for auth emails (magic links, password resets).
# Modern Supabase CLI versions render this as "Mailpit" at the same port.
# Open http://localhost:54324 to read messages.
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # skip email confirmation in local dev

# Google OAuth is intentionally NOT configured locally — it requires per-developer
# OAuth client setup. Use magic link (delivered to Mailpit at :54324) or
# email/password instead. See `npm run seed:users` for pre-seeded test accounts.
[auth.external.google]
enabled = false
